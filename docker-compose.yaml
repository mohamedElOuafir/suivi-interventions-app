services:

    mysql:
        image: mysql:8.0
        container_name: mysql-db
        restart: unless-stopped
        env_file:
            - ./backend/.env
        environment:
            MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
            MYSQL_DATABASE: ${DATABASE_NAME}
            MYSQL_USER: ${USER_DB}
            MYSQL_PASSWORD: ${PASSWORD_DB}
        
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
            interval: 5s
            timeout: 5s
            retries: 5
        ports:
            - "3306:3306"
        volumes:
            - mysql_data:/var/lib/mysql
            - ./backend/database/init:/docker-entrypoint-initdb.d:ro


        
    backend:
        build: ./backend
        container_name: suivi-intervention-backend
        restart: unless-stopped
        env_file:
            - ./backend/.env

        depends_on:
            mysql:
                condition: service_healthy
        
        ports:
            - "3000:3000"

    
    frontend:
        build: ./frontend
        container_name: suivi-intervention-frontend
        restart: unless-stopped
        
        depends_on:
            - backend

        ports:
            - "8080:8080"

    

volumes:
    mysql_data:
        