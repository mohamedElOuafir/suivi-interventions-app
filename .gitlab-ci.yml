stages:
    - test
    - quality_code_check
    - build_image
    - scan_built_image


run_backend_tests:
    image: node:20-slim
    stage: test
    cache:
        key: backend_$CI_COMMIT_REF_SLUG
        paths:
            - ./backend/.npm/
    before_script:
        - cd ./backend
        - npm config set cache .npm --global
        - npm ci
    script:
        - npm test


run_frontend_tests:
    image: node:20-alpine
    stage: test
    cache:
        key: frontend_$CI_COMMIT_REF_SLUG
        paths:
        - ./frontend/.npm/
    before_script:
        - cd ./frontend
        - npm config set cache .npm --global
        - npm ci
    script:
        - npm test


sonar_cloud_check:
    stage: quality_code_check
    image: sonarsource/sonar-scanner-cli:12.1
    variables:
        SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
        GIT_DEPTH: "0"
    cache:
        key: "sonar-cache-$CI_COMMIT_REF_SLUG"
        paths:
        - .sonar/cache

    script:
        - sonar-scanner


build_backend_image:
    stage: build_image
    image: docker:29.6.1
    variables:
        DOCKER_TLS_CERTDIR: "/certs"
    services:
        - docker:29.6.1-dind
    rules:
        - if: '$CI_COMMIT_BRANCH == "main"'
    before_script:
        - cd ./backend
        - echo "building the backend docker image"
        - echo "$REGISTRY_TOKEN" | docker login -u $REGISTRY_USERNAME --password-stdin

    script:
        - docker build -t $IMAGE_BACKEND_NAME:$IMAGE_BACKEND_TAG -t $IMAGE_BACKEND_NAME:$CI_COMMIT_SHORT_SHA .
        - docker push $IMAGE_BACKEND_NAME:$IMAGE_BACKEND_TAG
        - docker push $IMAGE_BACKEND_NAME:$CI_COMMIT_SHORT_SHA



build_frontend_image:
    stage: build_image
    image: docker:29.6.1
    services:
        - docker:29.6.1-dind
    variables:
        DOCKER_TLS_CERTDIR: "/certs"
    rules:
        - if: '$CI_COMMIT_BRANCH == "main"'
    before_script:
        - cd ./frontend
        - echo "building the frontend docker image"
        - echo "$REGISTRY_TOKEN" | docker login -u $REGISTRY_USERNAME --password-stdin
    script:
        - docker build -t $IMAGE_FRONTEND_NAME:$IMAGE_FRONTEND_TAG -t $IMAGE_FRONTEND_NAME:$CI_COMMIT_SHORT_SHA .
        - docker push $IMAGE_FRONTEND_NAME:$IMAGE_FRONTEND_TAG
        - docker push $IMAGE_FRONTEND_NAME:$CI_COMMIT_SHORT_SHA


scan_backend_image:
    image: aquasec/trivy:0.71.2
    stage: scan_built_image
    rules:
        - if: '$CI_COMMIT_BRANCH == "main"'
    script:
        - trivy image --severity CRITICAL,HIGH --exit-code 1 --no-progress $IMAGE_BACKEND_NAME:$CI_COMMIT_SHORT_SHA


scan_frontend_image:
    image: aquasec/trivy:0.71.2
    stage: scan_built_image
    rules:
        - if: '$CI_COMMIT_BRANCH == "main"'
    script:
        - trivy image --severity HIGH,CRITICAL --exit-code 1 --no-progress $IMAGE_FRONTEND_NAME:$CI_COMMIT_SHORT_SHA












