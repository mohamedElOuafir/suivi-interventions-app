# Building and scaning for vulnerabilities in backend image, then pushing it to the registry
build_backend_image:
    extends: .docker_daemon
    script:
        - cd ./backend
        - echo "building the backend docker image"
        - docker build -t $IMAGE_BACKEND_NAME:$IMAGE_BACKEND_TAG -t $IMAGE_BACKEND_NAME:$CI_COMMIT_SHORT_SHA .
        - ./bin/trivy image \
                            --severity HIGH,CRITICAL \
                            --exit-code 1 \
                            --no-progress \
                            $IMAGE_BACKEND_NAME:$CI_COMMIT_SHORT_SHA

        - echo "$REGISTRY_TOKEN" | docker login -u $REGISTRY_USERNAME --password-stdin docker.io
        - docker push $IMAGE_BACKEND_NAME:$IMAGE_BACKEND_TAG
        - docker push $IMAGE_BACKEND_NAME:$CI_COMMIT_SHORT_SHA



# Building and scaning for vulnerabilities in frontend image, then pushing it to the registry
build_frontend_image:
    extends: .docker_daemon    
    script:
        - cd ./frontend
        - echo "building the frontend docker image"
        - docker build -t $IMAGE_FRONTEND_NAME:$IMAGE_FRONTEND_TAG -t $IMAGE_FRONTEND_NAME:$CI_COMMIT_SHORT_SHA .
        - ./bin/trivy image \
                            --severity HIGH,CRITICAL \
                            --exit-code 1 \
                            --no-progress \
                            $IMAGE_FRONTEND_NAME:$CI_COMMIT_SHORT_SHA

        - echo "$REGISTRY_TOKEN" | docker login -u $REGISTRY_USERNAME --password-stdin docker.io
        - docker push $IMAGE_FRONTEND_NAME:$IMAGE_FRONTEND_TAG
        - docker push $IMAGE_FRONTEND_NAME:$CI_COMMIT_SHORT_SHA


    











