
# CI stages definition
stages:
    - test
    - quality_code_check
    - build_scan_push_image


# A base instructions for the docker in docker concept
.docker_daemon:
    stage: build_scan_push_image
    image: docker:29.6.1
    services:
        - docker:29.6.1-dind
    variables:
        DOCKER_TLS_CERTDIR: "/certs"
    rules:
        - if: '$CI_COMMIT_BRANCH == "main"'
    before_script:
        - apk add --no-cache curl
        - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh
        - pwd
        - ls -al




# Running tests for the backend 
run_backend_tests:
    image: node:20-slim
    stage: test
    cache:
        key: backend_$CI_COMMIT_REF_SLUG
        paths:
            - ./backend/.npm/
    before_script:
        - cd ./backend
        - npm config set cache .npm --global
        - npm ci
    script:
        - npm test


# Running the tests for the frontend
run_frontend_tests:
    image: node:20-alpine
    stage: test
    cache:
        key: frontend_$CI_COMMIT_REF_SLUG
        paths:
        - ./frontend/.npm/
    before_script:
        - cd ./frontend
        - npm config set cache .npm --global
        - npm ci
    script:
        - npm test


